apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/NIKHILMPM/argocd-demos.git
    targetRevision: main
    path: declarative_approach/online_shop

  destination:
    server: https://172.22.0.4:6443
    namespace: online-shop-app-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
