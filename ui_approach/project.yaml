apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: frontend-team
  namespace: argocd
spec:
  description: Project for frontend team apps

  # Allowed Git repositories for applications in this project
  sourceRepos:
    - https://github.com/NIKHILMPM/argocd-demos.git

  # Allowed deployment destinations
  destinations:
    - namespace: frontend
      server: https://172.22.0.4:6443 

  # Allowed cluster-wide resources
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  # Allowed namespace resources
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # RBAC roles inside this project
  roles:
    - name: frontend-admins
      description: Admins for frontend team
      policies:
        - p, proj:frontend-team:frontend-admins, applications, *, frontend-team/*, allow

