apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-app
  namespace: argocd
spec:
  project: frontend-team

  source:
    repoURL: https://github.com/NIKHILMPM/argocd-demos.git
    targetRevision: main
    path: ui_approach/nginx/

  destination:
    server: https://172.22.0.4:6443
    namespace: frontend

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
